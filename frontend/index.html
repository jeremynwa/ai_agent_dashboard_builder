<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/SK_Paris_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="origin" />
    <title>Edouard AI</title>
    <style>
      *:focus-visible {
        outline: 2px solid #C80041;
        outline-offset: 2px;
        border-radius: 4px;
      }
      *:focus:not(:focus-visible) { outline: none; }
      input:focus-visible, textarea:focus-visible, select:focus-visible {
        border-color: #C80041 !important;
        box-shadow: 0 0 0 3px rgba(200, 0, 65, 0.12) !important;
        outline: none !important;
      }
      button { transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease, opacity 0.15s ease; }
      input, textarea, select { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(168, 185, 195, 0.4); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(114, 142, 158, 0.5); }
      ::selection { background: rgba(200, 0, 65, 0.15); color: #323F48; }
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>
  </head>
  <body style="margin:0;background:#EAEEF1">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
