AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: App Factory - Lambda Backend + Cognito Auth

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
  PublishBucket:
    Type: String
    Default: ai-app-builder-sk-2026
  MyRegion:
    Type: String
    Default: eu-north-1
  GitLabToken:
    Type: String
    NoEcho: true
    Default: ""
  ServiceDeskToken:
    Type: String
    NoEcho: true
    Default: ""

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        RULES_BUCKET: !Ref PublishBucket
        PUBLISH_BUCKET: !Ref PublishBucket
        MY_REGION: !Ref MyRegion
        COGNITO_USER_POOL_ID: !Ref CognitoUserPool
        COGNITO_REGION: !Ref MyRegion

Resources:

  # ============ COGNITO ============
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: app-factory-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
          AttributeDataType: String

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: app-factory-web
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  # ============ API GATEWAY ============
  AppFactoryApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  # ============ GENERATE (Function URL — no 30s timeout) ============
  GenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-generate
      Handler: index.handler
      CodeUri: generate/
      Timeout: 600
      MemorySize: 512
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          USE_BETA_API: "true"
          DASHBOARD_SKILL_ID: "skill_01RPpTMLicWFr96R3kLV3YDW"
          DATA_ANALYZER_SKILL_ID: "skill_01TJ4sKM6v5aWiBfUCpE7aaM"
          INDUSTRY_FINANCE_SKILL_ID: "skill_01XhrMpqBzw5CoeqGp9dLYTy"
          INDUSTRY_ECOMMERCE_SKILL_ID: "skill_01BdUH8nfrq5o3PhtL4jmrXv"
          INDUSTRY_SAAS_SKILL_ID: "skill_01KSiWWfDMqT619dvHe9bwLR"
          INDUSTRY_LOGISTICS_SKILL_ID: "skill_01J4e3c46T3wrdtuRBRcRyGU"
          REVIEWER_SKILL_ID: "skill_01ABSnPFjpR2wUZuoKobc5vs"
          VISION_SKILL_ID: "skill_0167k41XCVLbcSksQvPsqTfi"
          SCRAPER_SKILL_ID: "skill_015tnYwBrkp8e4sYevkvqsWX"
          REVIEW_MODEL: "claude-haiku-4-5-20251001"
          VISION_MODEL: "claude-haiku-4-5-20251001"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - Content-Type
            - Authorization
          AllowMethods:
            - POST
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref PublishBucket
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ RULES ============
  RulesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-rules
      Handler: index.handler
      CodeUri: rules/
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /rules
            Method: GET
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref PublishBucket
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ PUBLISH ============
  PublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-publish
      Handler: index.handler
      CodeUri: publish/
      Timeout: 60
      MemorySize: 512
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /publish
            Method: POST
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref PublishBucket
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ DB PROXY ============
  DbFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-db
      Handler: index.handler
      CodeUri: db/
      Timeout: 30
      MemorySize: 256
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - Content-Type
            - Authorization
          AllowMethods:
            - POST
      Events:
        Schema:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /db/schema
            Method: POST
        Query:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /db/query
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ EXPORT (PPTX/XLSX/PDF) ============
  ExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-export
      Handler: index.handler
      CodeUri: export/
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          EXPORT_MODEL: "claude-haiku-4-5-20251001"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - Content-Type
            - Authorization
          AllowMethods:
            - POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ DYNAMODB — App Registry ============
  AppRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AppRegistry
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: appId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: appId
          KeyType: RANGE

  # ============ INTAKE (AI routing) ============
  IntakeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-intake
      Handler: index.handler
      CodeUri: intake/
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /intake
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ REVIEW CODE (web-app-reviewer skill) ============
  ReviewCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-review-code
      Handler: index.handler
      CodeUri: review-code/
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          USE_BETA_API: "true"
          WEB_APP_REVIEWER_SKILL_ID: "skill_01NGUU66Q3PCWWX5RgAbD7bz"
          REVIEW_PASS_THRESHOLD: "70"
          REVIEW_MODEL: "claude-sonnet-4-20250514"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - Content-Type
            - Authorization
          AllowMethods:
            - POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ GIT PUSH (GitLab API) ============
  GitPushFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-git-push
      Handler: index.handler
      CodeUri: git-push/
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          GITLAB_URL: "https://git.simon-kucher.com"
          GITLAB_TOKEN: !Ref GitLabToken
          GITLAB_GROUP_ID: "1658"
          GITLAB_TEAM_MEMBERS: "antoinesauauvageSKE2, marwanlenenE2, jeremygarneauSKE2, victoradrienguillermSKE2"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - Content-Type
            - Authorization
          AllowMethods:
            - POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ VM REQUEST (Service Desk + Teams) ============
  VmRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-vm-request
      Handler: index.handler
      CodeUri: vm-request/
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          TEAMS_WEBHOOK_URL: ""
          SERVICEDESK_URL: ""
          SERVICEDESK_TOKEN: !Ref ServiceDeskToken
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /vm-request
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ ESTIMATE COST ============
  EstimateCostFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-estimate-cost
      Handler: index.handler
      CodeUri: estimate-cost/
      Timeout: 5
      MemorySize: 128
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /estimate-cost
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ============ APPS (My Apps CRUD — DynamoDB) ============
  AppsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: app-factory-apps
      Handler: index.handler
      CodeUri: apps/
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          APP_REGISTRY_TABLE: AppRegistry
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /apps
            Method: GET
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppFactoryApi
            Path: /apps
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppRegistryTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - index.mjs
        External:
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

Outputs:
  ApiUrl:
    Description: API Gateway URL (rules + publish + db + intake + vm-request + apps)
    Value: !Sub 'https://${AppFactoryApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  GenerateUrl:
    Description: Generate Function URL (no 30s timeout)
    Value: !GetAtt GenerateFunctionUrl.FunctionUrl
  DbProxyUrl:
    Description: DB Proxy Function URL
    Value: !GetAtt DbFunctionUrl.FunctionUrl
  ExportUrl:
    Description: Export Function URL (no 30s timeout)
    Value: !GetAtt ExportFunctionUrl.FunctionUrl
  ReviewCodeUrl:
    Description: Review Code Function URL
    Value: !GetAtt ReviewCodeFunctionUrl.FunctionUrl
  GitPushUrl:
    Description: Git Push Function URL
    Value: !GetAtt GitPushFunctionUrl.FunctionUrl
  CognitoUserPoolId:
    Description: Cognito User Pool ID (for frontend .env)
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Description: Cognito App Client ID (for frontend .env)
    Value: !Ref CognitoUserPoolClient